<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spectral Sabre — Ghostline Studios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@200;300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="background.jsx"></script>
  <script type="text/babel" src="games.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>

  <script type="text/babel">
    function ProjectNav() {
      return (
        <header className="topnav">
          <a href="index.html" className="brand">
            <div className="brand-mark" />
            <span>Ghostline / Studios</span>
          </a>
          <nav>
            <a href="index.html">01 Home</a>
            <a href="projects.html" className="active">02 Projects</a>
            <a href="index.html#about">03 Studio</a>
            <a href="index.html#news">04 Devlog</a>
            <a href="index.html#careers">05 Careers</a>
            <a href="index.html#press">06 Press</a>
          </nav>
          <div className="meta">
            <span className="live-dot" />
            <span>Live · 2026.05.08</span>
          </div>
        </header>
      );
    }

    const G = SPECTRAL_SABRE;

    function SpectralSabrePage() {
      return (
        <>
          <CustomCursor />
          <EnergyField />
          <div className="bg-noise" />
          <div className="bg-vignette" />
          <div className="app">
            <ProjectNav />

            <section className="project-hero" data-screen-label="Sabre Hero">
              <div className="container">
                <a href="projects.html" className="project-back">← All projects</a>
                <div className="project-hero-grid">
                  <div>
                    <div className="project-tag" style={{ color: "var(--phantom-glow)" }}>Pre-Alpha · Android first · 2027 Vertical Slice</div>
                    <h1 className="project-title">Spectral Sabre</h1>
                    <p className="project-tagline">{G.tagline}</p>
                    <p className="project-blurb">{G.blurb}</p>
                    <div className="project-stats">
                      <div><strong>Tactical Stealth</strong>Genre</div>
                      <div><strong>4 + KIP</strong>Squad</div>
                      <div><strong>Android · iOS</strong>Platform</div>
                      <div><strong>3–8 min</strong>Mission</div>
                    </div>
                    <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
                      <a className="btn primary" href="#"><span>Wishlist</span><span className="arrow">↗</span></a>
                      <a className="btn" href="#"><span>Press Kit</span></a>
                    </div>
                  </div>
                  <div className="project-key-art">
                    <div className="placeholder" style={{
                      background: "radial-gradient(ellipse at 70% 30%, rgba(179, 136, 255, 0.35), transparent 60%), radial-gradient(ellipse at 20% 80%, rgba(124, 77, 255, 0.22), transparent 55%), linear-gradient(180deg, #0d0a18, #06040c)",
                    }}>
                      <SpectralSabreArt big />
                    </div>
                  </div>
                </div>
              </div>
            </section>

            <section className="project-section" data-screen-label="Sabre Pillars">
              <div className="container">
                <div className="project-section-head">
                  <div>
                    <div className="index">— 01 / Pillars</div>
                    <h2>Five rules we follow.</h2>
                  </div>
                  <div className="meta-block">
                    <strong>Design intent</strong>
                    Tactical first.<br />Shooter second.
                  </div>
                </div>
                <div className="feature-grid">
                  {G.pillars.map((p, i) => (
                    <div className="feature-cell" key={i} style={{ flexDirection: "column", alignItems: "flex-start", paddingTop: 32, paddingBottom: 32, minHeight: 0 }}>
                      <div style={{ fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: "0.3em", color: "var(--phantom)", textTransform: "uppercase", marginBottom: 14 }}>PILLAR · {p.num}</div>
                      <div style={{ fontSize: 18, fontWeight: 400, color: "white", marginBottom: 10, letterSpacing: "0.02em" }}>{p.title}</div>
                      <div style={{ fontSize: 14, color: "var(--wraith)", lineHeight: 1.55 }}>{p.body}</div>
                    </div>
                  ))}
                </div>
              </div>
            </section>

            <section className="project-section" data-screen-label="Sabre Squad">
              <div className="container">
                <div className="project-section-head">
                  <div>
                    <div className="index">— 02 / Squad</div>
                    <h2>Four operators &amp; a ghost.</h2>
                  </div>
                  <div className="meta-block">
                    <strong>Sabre Unit roster</strong>
                    Each one a discipline,<br />a temperament, a piece of the kit.
                  </div>
                </div>
                <div className="squad-grid">
                  {G.operators.map((op) => (
                    <div className="squad-card" key={op.id}>
                      <div className="squad-portrait" style={{ backgroundImage: `url("${op.img}")` }} />
                      <div className="squad-meta">
                        <div className="squad-id">{op.id}</div>
                        <div className="squad-name">{op.codename}</div>
                        <div className="squad-role">{op.role}</div>
                        <div className="squad-spec">{op.speciality}</div>
                        <div className="squad-bio">{op.bio}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </section>

            <section className="project-section" data-screen-label="Sabre Systems">
              <div className="container">
                <div className="project-section-head">
                  <div>
                    <div className="index">— 03 / Systems</div>
                    <h2>How an infil holds together.</h2>
                  </div>
                  <div className="meta-block">
                    <strong>Six core systems</strong>
                    Camo · Squad · Sync · KIP<br />Recon · Detection
                  </div>
                </div>
                <div className="feature-grid" style={{ gridTemplateColumns: "repeat(2, 1fr)" }}>
                  {G.systems.map((s, i) => (
                    <div className="feature-cell" key={i} style={{ flexDirection: "column", alignItems: "flex-start", paddingTop: 36, paddingBottom: 36, minHeight: 0 }}>
                      <div style={{ fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: "0.3em", color: "var(--spectral)", textTransform: "uppercase", marginBottom: 14 }}>{s.tag}</div>
                      <div style={{ fontSize: 20, fontWeight: 400, color: "white", marginBottom: 12, letterSpacing: "0.02em" }}>{s.title}</div>
                      <div style={{ fontSize: 14, color: "var(--wraith)", lineHeight: 1.6 }}>{s.body}</div>
                    </div>
                  ))}
                </div>
              </div>
            </section>

            <section className="project-section" data-screen-label="Sabre KIP comms">
              <div className="container">
                <div className="project-section-head">
                  <div>
                    <div className="index">— 04 / Comms</div>
                    <h2>KIP, in their own words.</h2>
                  </div>
                  <div className="meta-block">
                    <strong>Voice samples</strong>
                    Kinetic Intelligence Platform<br />Field log · channel SABRE-9
                  </div>
                </div>
                <div style={{ display: "grid", gap: 12 }}>
                  {G.kipLines.map((line, i) => (
                    <div key={i} style={{
                      padding: "22px 28px",
                      borderRadius: 14,
                      border: "1px solid rgba(179, 136, 255, 0.18)",
                      background: "linear-gradient(90deg, rgba(124, 77, 255, 0.06), rgba(255,255,255,0.0))",
                      display: "grid",
                      gridTemplateColumns: "120px 1fr",
                      gap: 24,
                      alignItems: "center",
                    }}>
                      <div style={{ fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: "0.24em", color: "var(--phantom-glow)", textTransform: "uppercase" }}>KIP · {String(i + 1).padStart(2, "0")}</div>
                      <div style={{ fontSize: 16, color: "var(--wraith)", fontWeight: 300, lineHeight: 1.5, fontStyle: "italic" }}>“{line}”</div>
                    </div>
                  ))}
                </div>
              </div>
            </section>

            <SiteFooter />
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<SpectralSabrePage />);
  </script>
</body>
</html>
